<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var path = location.pathname || "";
        var j = path.indexOf("/frontend/");
        var front = j >= 0 ? path.slice(0, j + "/frontend".length) : "/frontend";
        var b = document.createElement("base");
        b.href = front + "/pages/";
        document.head.appendChild(b);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Каталог — Онлайн-библиотека</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark" aria-hidden="true">📚</span>
          <span>
            <span class="brand-text">Онлайн-библиотека</span>
            <span class="brand-tag">каталог</span>
          </span>
        </a>
        <nav class="site-nav" aria-label="Основная навигация">
          <a href="index.html">Главная</a>
          <a href="books.html" class="is-active">Каталог</a>
          <a href="login.html" data-nav-guest>Вход</a>
          <a href="register.html" data-nav-guest>Регистрация</a>
          <a href="profile.html" data-nav-auth hidden>Профиль</a>
          <button type="button" class="btn btn-ghost" data-nav-auth hidden data-logout>
            Выйти
          </button>
        </nav>
      </div>
    </header>
    <main>
      <div class="container">
        <h1>Каталог книг</h1>
        <p class="muted">Поиск по названию и автору, сортировка и постраничный вывод.</p>
        <form id="books-filters" class="filters card" style="margin-top: 20px">
          <div class="field">
            <label for="books-search">Поиск</label>
            <input id="books-search" type="text" name="search" maxlength="120" placeholder="Название или автор" />
          </div>
          <div class="field">
            <label for="books-sort">Сортировка</label>
            <select id="books-sort" name="sort_by">
              <option value="date_desc">Сначала новые</option>
              <option value="date_asc">Сначала старые</option>
              <option value="rating_desc">По рейтингу ↓</option>
              <option value="rating_asc">По рейтингу ↑</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Применить</button>
        </form>
        <p id="books-meta" class="muted small"></p>
        <p id="books-error" class="form-error"></p>
        <div id="books-list" class="books-grid"></div>
        <div class="pager">
          <button type="button" class="btn" id="books-prev">Назад</button>
          <button type="button" class="btn" id="books-next">Вперёд</button>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="container">Онлайн-библиотека</div>
    </footer>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/chat.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/books.js"></script>
  </body>
</html>
